baseurl: ""

future: true

# SNS settings
RSS: true
weibo_username: 
zhihu_username: 
github_username: TheShycute
twitter_username: 

# Build settings
highlighter: rouge
permalink: pretty
paginate: 10
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
  ]
anchorjs: true

plugins: [jekyll-paginate]

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Disqus settings
disqus_username: 

# Netease settings
netease_comment: false

# Analytics settings
# Baidu Analytics  
# ba_track_id: [your track id]

# Google Analytics
# ga_track_id: "UA-xxxxxx-xx"
# ga_domain: huangxuan.me

# Sidebar settings
sidebar: true
sidebar-about-description: "代码与生活，皆不可辜负 | 天使皮卡丘丨"
sidebar-avatar: https://github.com/TheShycute.png

# Featured Tags
featured-tags: true
featured-condition-size: 1

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: false

# Friends
friends:
  [
    { title: "GitHub", href: "https://github.com/TheShycute" },
  ]
