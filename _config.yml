# Site settings
title: 天使皮卡丘丨的博客
SEOTitle: 天使皮卡丘丨的博客 | ShyCute Blog
header-img: img/home-bg.jpg
email: 2906649414@qq.com
description: "这里是 天使皮卡丘丨 的个人博客，记录学习与生活的点点滴滴"
keyword: "天使皮卡丘丨,博客,技术,编程"
